version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./saas.db
      # In production, use real values from .env
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/saas.db:/app/saas.db


  # El antiguo servidor de baileys se mantiene para no interrumpir el servicio actual.
